name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.check_tag.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: [check, test]
    if: needs.check.outputs.skip == 'false'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$TARGET"

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          tar -czf "ccam-$TARGET.tar.gz" ccam
          mv "ccam-$TARGET.tar.gz" ../../../

      - name: Checksum
        env:
          TARGET: ${{ matrix.target }}
        run: shasum -a 256 "ccam-$TARGET.tar.gz" > "ccam-$TARGET.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccam-${{ matrix.target }}
          path: |
            ccam-${{ matrix.target }}.tar.gz
            ccam-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish release
    needs: [check, build]
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          files: |
            ccam-aarch64-apple-darwin.tar.gz
            ccam-aarch64-apple-darwin.tar.gz.sha256
            ccam-x86_64-apple-darwin.tar.gz
            ccam-x86_64-apple-darwin.tar.gz.sha256
          generate_release_notes: true
